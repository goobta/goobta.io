server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro builds directory-style URLs (/about/ -> /about/index.html)
    location / {
        try_files $uri $uri/ =404;
    }

    # Hashed build assets are content-addressed and immutable -> cache hard
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
